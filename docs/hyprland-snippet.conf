# --- winmode / winbar (add near other binds / exec-once) ---
exec-once = ~/.local/bin/winmode-boot   # waybar + (if on) dock + desk
bind = $mainMod, W, exec, ~/.local/bin/winmode
bind = $mainMod, B, exec, ~/.local/bin/toggle-waybar

# source last so winmode can inject ALT+TAB / Super+R overrides
source = ~/.config/hypr/mode.conf
